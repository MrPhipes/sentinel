name: Publicar imagen (ghcr.io)

# Publica la imagen multi-arquitectura en el GitHub Container Registry.
# Se dispara al pushear un tag vX.Y.Z, o manualmente desde la pestaña Actions.
on:
  push:
    tags: [ "v*" ]
  workflow_dispatch:

jobs:
  publish:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write   # permite empujar al ghcr.io con el GITHUB_TOKEN automático
    steps:
      - uses: actions/checkout@v4

      # QEMU + buildx para compilar también arm/v7 y arm64 desde el runner amd64.
      - uses: docker/setup-qemu-action@v3
      - uses: docker/setup-buildx-action@v3

      - name: Login en ghcr.io
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Metadatos (tags y labels)
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ghcr.io/${{ github.repository }}
          tags: |
            type=semver,pattern={{version}}
            type=raw,value=latest

      - name: Build y push multi-arch
        uses: docker/build-push-action@v6
        with:
          context: .
          platforms: linux/amd64,linux/arm64,linux/arm/v7
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
