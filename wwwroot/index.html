<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>Phipes Sentinel</title>
  <style>
    :root {
      --bg: #0f1419;
      --card: #1a212b;
      --border: #2a3441;
      --text: #e6edf3;
      --muted: #8b98a8;
      --green: #2ea043;
      --red: #cf3b3b;
      --accent: #3b82f6;
    }
    * { box-sizing: border-box; }
    body {
      margin: 0;
      background: var(--bg);
      color: var(--text);
      font-family: system-ui, -apple-system, "Segoe UI", Roboto, sans-serif;
      -webkit-font-smoothing: antialiased;
    }
    header {
      padding: 20px 24px;
      border-bottom: 1px solid var(--border);
      display: flex;
      align-items: center;
      justify-content: space-between;
      flex-wrap: wrap;
      gap: 12px;
    }
    h1 { font-size: 20px; margin: 0; font-weight: 600; }
    h1 span { color: var(--accent); }
    .meta { color: var(--muted); font-size: 13px; }
    .header-right { display: flex; align-items: center; gap: 16px; }
    main {
      max-width: 980px;
      margin: 0 auto;
      padding: 24px;
      display: grid;
      grid-template-columns: repeat(auto-fill, minmax(300px, 1fr));
      gap: 16px;
    }
    .card {
      background: var(--card);
      border: 1px solid var(--border);
      border-radius: 12px;
      padding: 18px;
    }
    .card-head {
      display: flex;
      align-items: center;
      justify-content: space-between;
      margin-bottom: 4px;
    }
    .name { font-weight: 600; font-size: 16px; }
    .host { color: var(--muted); font-size: 13px; font-family: ui-monospace, monospace; }
    .dot { width: 10px; height: 10px; border-radius: 50%; display: inline-block; margin-right: 8px; }
    .dot.on { background: var(--green); box-shadow: 0 0 8px var(--green); }
    .dot.off { background: var(--red); }
    .state { display: flex; align-items: center; font-size: 13px; color: var(--muted); }
    .ports { display: flex; flex-wrap: wrap; gap: 6px; margin: 14px 0; }
    .port {
      font-size: 12px;
      padding: 3px 9px;
      border-radius: 999px;
      border: 1px solid var(--border);
      font-family: ui-monospace, monospace;
    }
    .port.open { color: var(--green); border-color: rgba(46,160,67,.5); }
    .port.closed { color: var(--muted); }
    .row { display: flex; align-items: center; justify-content: space-between; gap: 10px; }
    .actions { display: flex; gap: 8px; }
    button {
      background: var(--accent);
      color: white;
      border: 0;
      border-radius: 8px;
      padding: 9px 16px;
      font-size: 14px;
      font-weight: 500;
      cursor: pointer;
    }
    button:hover { filter: brightness(1.1); }
    button:disabled { opacity: .5; cursor: default; }
    button.ghost {
      background: transparent;
      border: 1px solid var(--border);
      color: var(--muted);
      padding: 8px 12px;
    }
    button.danger { background: var(--red); }
    .latency { color: var(--muted); font-size: 13px; }
    #toast {
      position: fixed;
      bottom: 24px;
      left: 50%;
      transform: translateX(-50%) translateY(120px);
      background: var(--card);
      border: 1px solid var(--border);
      padding: 12px 20px;
      border-radius: 10px;
      transition: transform .25s ease;
      max-width: 90vw;
    }
    #toast.show { transform: translateX(-50%) translateY(0); }
    footer { text-align: center; color: var(--muted); font-size: 12px; padding: 24px; }
    footer a { color: var(--accent); text-decoration: none; }

    /* Modal */
    .overlay {
      position: fixed; inset: 0;
      background: rgba(0,0,0,.6);
      display: none;
      align-items: center; justify-content: center;
      padding: 16px;
    }
    .overlay.show { display: flex; }
    .modal {
      background: var(--card);
      border: 1px solid var(--border);
      border-radius: 14px;
      width: 460px; max-width: 100%;
      max-height: 90vh; overflow-y: auto;
      padding: 22px;
    }
    .modal h2 { margin: 0 0 16px; font-size: 18px; }
    label { display: block; font-size: 13px; color: var(--muted); margin: 12px 0 5px; }
    input {
      width: 100%;
      background: var(--bg);
      border: 1px solid var(--border);
      border-radius: 8px;
      padding: 9px 11px;
      color: var(--text);
      font-size: 14px;
      font-family: inherit;
    }
    input:focus { outline: 1px solid var(--accent); border-color: var(--accent); }
    .port-row { display: flex; gap: 8px; margin-bottom: 8px; }
    .port-row input.pname { flex: 2; }
    .port-row input.pnum { flex: 1; }
    .port-row button { padding: 0 12px; }
    .modal-actions { display: flex; justify-content: flex-end; gap: 10px; margin-top: 20px; }
    .err { color: var(--red); font-size: 13px; margin-top: 12px; min-height: 16px; }
    .add-port { font-size: 13px; }
  </style>
</head>
<body>
  <header>
    <h1>Phipes <span>Sentinel</span></h1>
    <div class="header-right">
      <span class="meta" id="updated">Cargando…</span>
      <button id="btn-add">+ Agregar equipo</button>
    </div>
  </header>

  <main id="grid"></main>

  <footer>
    Phipes Sentinel — monitor + Wake-on-LAN ·
    <a href="https://phipes.cl" target="_blank" rel="noopener">phipes.cl</a>
  </footer>

  <div id="toast"></div>

  <!-- Modal de alta/edición -->
  <div class="overlay" id="overlay">
    <div class="modal">
      <h2 id="modal-title">Agregar equipo</h2>
      <input type="hidden" id="f-id" />
      <label for="f-name">Nombre</label>
      <input id="f-name" placeholder="NAS de casa" />
      <label for="f-host">Host (IP o hostname)</label>
      <input id="f-host" placeholder="192.168.1.10" />
      <label for="f-mac">MAC</label>
      <input id="f-mac" placeholder="AA:BB:CC:DD:EE:FF" />
      <label>Puertos TCP a chequear</label>
      <div id="ports"></div>
      <button class="ghost add-port" id="btn-add-port" type="button">+ Agregar puerto</button>
      <div class="err" id="modal-err"></div>
      <div class="modal-actions">
        <button class="ghost" id="btn-cancel" type="button">Cancelar</button>
        <button id="btn-save" type="button">Guardar</button>
      </div>
    </div>
  </div>

  <script>
    const grid = document.getElementById("grid");
    const updated = document.getElementById("updated");
    const toast = document.getElementById("toast");
    const overlay = document.getElementById("overlay");
    const portsBox = document.getElementById("ports");
    const modalErr = document.getElementById("modal-err");

    function showToast(msg) {
      toast.textContent = msg;
      toast.classList.add("show");
      setTimeout(() => toast.classList.remove("show"), 3000);
    }

    function timeAgo(iso) {
      const secs = Math.round((Date.now() - new Date(iso).getTime()) / 1000);
      if (secs < 60) return `hace ${secs}s`;
      return `hace ${Math.round(secs / 60)}m`;
    }

    function escapeHtml(s) {
      return String(s).replace(/[&<>"']/g, c =>
        ({ "&": "&amp;", "<": "&lt;", ">": "&gt;", '"': "&quot;", "'": "&#39;" }[c]));
    }

    function card(d) {
      const ports = (d.ports || [])
        .map(p => `<span class="port ${p.open ? "open" : "closed"}">${escapeHtml(p.name)}:${p.number}</span>`)
        .join("");
      const latency = d.online && d.latencyMs != null ? `${d.latencyMs} ms` : "";
      return `
        <div class="card">
          <div class="card-head">
            <div>
              <div class="name">${escapeHtml(d.name)}</div>
              <div class="host">${escapeHtml(d.host)}</div>
            </div>
            <div class="state">
              <span class="dot ${d.online ? "on" : "off"}"></span>
              ${d.online ? "En línea" : "Apagado"}
            </div>
          </div>
          <div class="ports">${ports || '<span class="port closed">sin puertos</span>'}</div>
          <div class="row">
            <div class="actions">
              <button class="ghost" data-edit="${d.id}">Editar</button>
              <button class="ghost" data-del="${d.id}">Eliminar</button>
            </div>
            <button data-wake="${d.id}" ${d.online ? "disabled" : ""}>
              ${d.online ? "Encendido" : "Encender"}
            </button>
          </div>
          <div class="latency" style="margin-top:8px">${latency}</div>
        </div>`;
    }

    let lastDevices = [];

    async function load() {
      try {
        const res = await fetch("/api/devices");
        lastDevices = await res.json();
        grid.innerHTML = lastDevices.length
          ? lastDevices.map(card).join("")
          : '<p class="meta">No hay equipos. Usá “+ Agregar equipo”.</p>';
        updated.textContent = lastDevices.length
          ? `Actualizado ${timeAgo(lastDevices[0].lastChecked)}`
          : "";
        for (const b of grid.querySelectorAll("[data-wake]"))
          b.addEventListener("click", () => wake(b.dataset.wake, b));
        for (const b of grid.querySelectorAll("[data-edit]"))
          b.addEventListener("click", () => openModal(b.dataset.edit));
        for (const b of grid.querySelectorAll("[data-del]"))
          b.addEventListener("click", () => removeDevice(b.dataset.del));
      } catch {
        updated.textContent = "Error al consultar el servicio";
      }
    }

    async function wake(id, btn) {
      btn.disabled = true;
      btn.textContent = "Enviando…";
      try {
        const res = await fetch(`/api/devices/${id}/wake`, { method: "POST" });
        const data = await res.json();
        showToast(data.message || "Paquete enviado");
      } catch {
        showToast("Error al enviar el Wake-on-LAN");
      } finally {
        setTimeout(load, 1500);
      }
    }

    // --- Modal de edición ---

    function portRow(name = "", number = "") {
      const div = document.createElement("div");
      div.className = "port-row";
      div.innerHTML = `
        <input class="pname" placeholder="SSH" value="${escapeHtml(name)}" />
        <input class="pnum" type="number" placeholder="22" value="${number}" />
        <button class="ghost" type="button">✕</button>`;
      div.querySelector("button").addEventListener("click", () => div.remove());
      return div;
    }

    function openModal(id) {
      modalErr.textContent = "";
      portsBox.innerHTML = "";
      const d = id ? lastDevices.find(x => x.id === id) : null;
      document.getElementById("modal-title").textContent = d ? "Editar equipo" : "Agregar equipo";
      document.getElementById("f-id").value = d ? d.id : "";
      document.getElementById("f-name").value = d ? d.name : "";
      document.getElementById("f-host").value = d ? d.host : "";
      document.getElementById("f-mac").value = d ? d.macAddress : "";
      const ports = d ? d.ports : [];
      if (ports && ports.length)
        ports.forEach(p => portsBox.appendChild(portRow(p.name, p.number)));
      else
        portsBox.appendChild(portRow());
      overlay.classList.add("show");
    }

    function closeModal() { overlay.classList.remove("show"); }

    async function save() {
      const id = document.getElementById("f-id").value;
      const ports = [...portsBox.querySelectorAll(".port-row")]
        .map(r => ({
          name: r.querySelector(".pname").value.trim(),
          number: parseInt(r.querySelector(".pnum").value, 10)
        }))
        .filter(p => p.name && Number.isInteger(p.number));

      const payload = {
        name: document.getElementById("f-name").value.trim(),
        host: document.getElementById("f-host").value.trim(),
        macAddress: document.getElementById("f-mac").value.trim(),
        ports
      };

      const url = id ? `/api/config/devices/${id}` : "/api/config/devices";
      const method = id ? "PUT" : "POST";
      try {
        const res = await fetch(url, {
          method,
          headers: { "Content-Type": "application/json" },
          body: JSON.stringify(payload)
        });
        if (!res.ok) {
          const e = await res.json().catch(() => ({}));
          modalErr.textContent = e.error || "No se pudo guardar";
          return;
        }
        closeModal();
        showToast(id ? "Equipo actualizado" : "Equipo agregado");
        load();
      } catch {
        modalErr.textContent = "Error de red al guardar";
      }
    }

    async function removeDevice(id) {
      const d = lastDevices.find(x => x.id === id);
      if (!confirm(`¿Eliminar "${d ? d.name : id}" del monitoreo?`)) return;
      try {
        const res = await fetch(`/api/config/devices/${id}`, { method: "DELETE" });
        if (res.ok || res.status === 204) {
          showToast("Equipo eliminado");
          load();
        } else {
          showToast("No se pudo eliminar");
        }
      } catch {
        showToast("Error de red al eliminar");
      }
    }

    document.getElementById("btn-add").addEventListener("click", () => openModal(null));
    document.getElementById("btn-add-port").addEventListener("click", () => portsBox.appendChild(portRow()));
    document.getElementById("btn-cancel").addEventListener("click", closeModal);
    document.getElementById("btn-save").addEventListener("click", save);
    overlay.addEventListener("click", e => { if (e.target === overlay) closeModal(); });

    load();
    setInterval(load, 5000);
  </script>
</body>
</html>
